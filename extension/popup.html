<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HashGuard</title>
  <style>
    body {
      width: 320px;
      padding: 15px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #1e1e1e;
      color: #e0e0e0;
      margin: 0;
    }
    h2 { margin-top: 0; font-size: 18px; color: #4ade80; text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px; }
    input[type="password"] { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #444; border-radius: 5px; background-color: #2d2d2d; color: #fff; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background-color: #38bdf8; color: #000; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    button:hover { background-color: #0ea5e9; }
    .result-box { margin-top: 15px; padding: 10px; background-color: #2d2d2d; border-radius: 5px; font-size: 14px; display: none; }
    .status { margin-bottom: 8px; }
    .vulnerable { color: #f87171; font-weight: bold;}
    .secure { color: #4ade80; font-weight: bold;}
    /* Moved from inline style to comply with Manifest V3 CSP */
    #recommendation { margin-top: 10px; font-style: italic; color: #38bdf8; }
  </style>
</head>
<body>
  <h2>🛡️ HashGuard</h2>
  <input type="password" id="passwordInput" placeholder="Enter password to check...">
  <button id="checkBtn">Analyze Password</button>

  <div id="resultBox" class="result-box">
    <div id="breachStatus" class="status"></div>
    <div id="crackTime" class="status"></div>
    <div id="recommendation" class="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
